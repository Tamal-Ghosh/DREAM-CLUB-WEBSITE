<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Basic page setup -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | Dream</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/login.css">
</head>
<body>
	<!-- Main login page container -->
	<main class="login-shell">
		<!-- Left side: logo and heading -->
		<section class="visual" aria-label="Community message">
			<div class="logo-row" aria-label="Club and KUET logos">
				<img class="brand-logo" src="../assets/logo.jpg" alt="Club logo">
				<img class="kuet-logo" src="../assets/logoKuet.png" alt="KUET logo">
			</div>
			<h1>Welcome to the Lifesaver Network</h1>
			
		
		</section>

		<!-- Right side: login form -->
		<section class="form-wrap" aria-label="Login form section">
			<form class="form-inner" action="#" method="post" autocomplete="on">
				<h2>Sign In</h2>
				<p class="subtitle">Use your member account credentials.</p>

				<!-- Email input -->
				<div class="field">
					<label for="email">Email Address</label>
					<input id="email" name="email" type="email" placeholder="you@example.com" required>
				</div>

				<!-- Password input -->
				<div class="field">
					<label for="password">Password</label>
					<input id="password" name="password" type="password" placeholder="Enter your password" required minlength="6">
				</div>

				<!-- Remember and forgot password row -->
				<div class="row">
					<label class="check" for="remember">
						<input id="remember" name="remember" type="checkbox">
						<span>Remember me</span>
					</label>
					<a class="link" href="#">Forgot password?</a>
				</div>

				<!-- Submit button -->
				<button class="btn" type="submit">Log In</button>

				<!-- Link to register page -->
				<p class="hint">New here? <a class="link" href="register.html">Create an account</a></p>
				<p class="safe">Secured connection</p>
			</form>
		</section>
	</main>
</body>
</html>
