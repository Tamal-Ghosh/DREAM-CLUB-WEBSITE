<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Dream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/register.css">
  <link rel="stylesheet" href="css/site-shell.css">
</head>
<body data-page="register">
  <header class="site-header">
    <div class="site-shell-inner">
      <a class="site-brand" href="home.html" aria-label="Dream home">
        <div class="site-brand-logos" aria-hidden="true">
          <img class="site-brand-logo" src="../assets/logo.jpg" alt="">
          <img class="site-brand-logo contain" src="../assets/logoKuet.png" alt="">
        </div>
        <div class="site-brand-copy">
          <strong>Dream</strong>
          <span>Blood donation support network</span>
        </div>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="home.html" data-page="home">Home</a>
        <a href="about.html" data-page="about">About</a>
        <a href="our_team.html" data-page="team">Our Team</a>
        <a href="contact.html" data-page="contact">Contact</a>
        <a href="login.html" data-page="login">Login</a>
      </nav>
    </div>
  </header>
  <main class="register-shell">
    <section class="form-wrap" aria-label="Register form section">
      <form class="form-inner" action="#" method="post" autocomplete="on">
        <h2>Create Account</h2>
        <p class="subtitle">Fill in your details to get started.</p>

        <!-- Name fields -->
        <div class="field-grid">
          <div class="field">
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" placeholder="John" required>
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" placeholder="Doe" required>
          </div>
        </div>

        <!-- Email input -->
        <div class="field">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required>
        </div>

        <!-- Role selection -->
        <div class="field">
          <label for="role">Register As</label>
          <select id="role" name="role" required>
            <option value="" disabled>Select role</option>
            <option value="patient">Patient</option>
            <option value="donor" selected>Donor</option>
          </select>
        </div>

        <!-- Blood group and phone -->
        <div class="field-grid">
          <div class="field">
            <label for="bloodGroup">Blood Group</label>
            <select id="bloodGroup" name="bloodGroup" required>
              <option value="" selected disabled>Select group</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
          </div>
          <div class="field">
            <label for="phone">Phone Number</label>
            <input id="phone" name="phone" type="tel" placeholder="0123456789" required>
          </div>
        </div>

        <!-- Password setup -->
        <div class="field-grid">
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Minimum 6 characters" required minlength="6">
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat password" required minlength="6">
          </div>
        </div>

        <!-- Terms agreement -->
        <label class="check" for="terms">
          <input id="terms" name="terms" type="checkbox" required>
          <span>I agree to the Terms and Privacy Policy</span>
        </label>

        <!-- Submit and sign-in link -->
        <button class="btn" type="submit">Create Account</button>

        <p class="hint">Already have an account? <a class="link" href="login.html">Sign in</a></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-shell-inner">
      <div class="site-brand-copy">
        <strong>Dream</strong>
        <span>© 2026 Dream. Stay connected, stay ready.</span>
      </div>
    </div>
  </footer>

  <script src="js/site-shell.js" defer></script>
</body>
</html>
